<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Robot - ESP8266</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            user-select: none; /* Evita seleccionar texto al tocar botones */
        }

        h2 {
            color: #007bff;
            letter-spacing: 1px;
        }

        /* Pantalla del Sensor de Proximidad */
        .display-sensor {
            background: #000;
            color: #00ff41; /* Verde neón */
            padding: 20px;
            border: 2px solid #333;
            border-radius: 15px;
            display: inline-block;
            width: 220px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            margin-bottom: 25px;
        }

        .display-sensor small {
            color: #888;
            text-transform: uppercase;
            font-size: 0.7rem;
            display: block;
            margin-bottom: 5px;
        }

        .valor-distancia {
            font-size: 3rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Contenedor del Joystick */
        .joystick {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .fila {
            display: flex;
            gap: 15px;
        }

        /* Estilo Circular de los Botones */
        .btn {
            width: 80px;
            height: 80px;
            background: #2c2c2c;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border-radius: 50%;
            box-shadow: 0 6px #000;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: #007bff;
            box-shadow: 0 2px #0056b3;
            transform: translateY(4px);
        }

        .status-box {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #666;
        }

        #comando-actual {
            color: #007bff;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>ROBOT MONITOR V1.0</h2>

    <div class="display-sensor">
        <small>Distancia al Obstáculo</small>
        <span id="dist" class="valor-distancia">--</span> <span style="font-size: 1.2rem;">cm</span>
    </div>

    <div class="joystick">
        <div class="fila">
            <a href="/up" class="btn">▲</a>
        </div>
        <div class="fila">
            <a href="/left" class="btn">◀</a>
            <a href="/right" class="btn">▶</a>
        </div>
        <div class="fila">
            <a href="/down" class="btn">▼</a>
        </div>
    </div>

    <div class="status-box">
        Última orden: <span id="comando-actual">Detenido</span>
    </div>

    <script>
        // Esta función pide el valor a la ruta /distancia cada 500ms
        setInterval(function() {
            fetch('/distancia')
                .then(response => {
                    if (!response.ok) throw new Error('Cargando...');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('dist').innerHTML = data;
                })
                .catch(err => {
                    // Aquí podrías manejar si se pierde la conexión
                });
        }, 500);
    </script>

</body>
</html>
