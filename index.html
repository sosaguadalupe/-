<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot Control – UTEC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00A9E0;
    --cyan-dark: #0087B8;
    --cyan-light: rgba(0,169,224,0.12);
    --black: #000000;
    --white: #ffffff;
    --gray: #f4f6f8;
    --text-muted: #7a8a94;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px 32px;
    gap: 24px;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-bottom: 3px solid var(--cyan);
    padding-bottom: 16px;
    width: 100%;
    max-width: 340px;
  }

  .utec-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .isotipo { width: 36px; height: 36px; }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-utec {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--black);
    letter-spacing: 2px;
  }

  .logo-sub {
    font-size: 0.5rem;
    font-weight: 400;
    color: var(--cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-title {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .sensor-card {
    background: var(--gray);
    border-left: 4px solid var(--cyan);
    border-radius: 8px;
    padding: 14px 32px;
    text-align: center;
    width: 100%;
    max-width: 340px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .sensor-icon { font-size: 1.4rem; opacity: 0.5; }
  .sensor-info { flex: 1; text-align: left; }

  .sensor-label {
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
  }

  .sensor-row { display: flex; align-items: baseline; gap: 6px; }

  .sensor-value {
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--cyan);
    line-height: 1;
    transition: color 0.3s;
  }
  .sensor-value.warning { color: #F6CA21; }
  .sensor-value.danger  { color: #DF2B31; }

  .sensor-unit { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }

  .joystick-zone {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    background: var(--gray);
    border: 2px solid #e0e8ec;
    position: relative;
    cursor: grab;
    box-shadow: 0 4px 24px rgba(0,169,224,0.10);
  }

  .joystick-zone::before,
  .joystick-zone::after {
    content: '';
    position: absolute;
    background: #dde4e8;
  }
  .joystick-zone::before { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
  .joystick-zone::after  { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px dashed rgba(0,169,224,0.2);
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    pointer-events: none;
  }

  .dir-arrow {
    position: absolute;
    font-size: 13px;
    color: rgba(0,169,224,0.25);
    transition: color 0.1s;
    pointer-events: none;
    font-weight: 700;
  }
  .dir-arrow.active { color: var(--cyan); }
  .dir-arrow.up    { top: 10px;    left: 50%; transform: translateX(-50%); }
  .dir-arrow.down  { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .dir-arrow.left  { left: 10px;   top: 50%;  transform: translateY(-50%); }
  .dir-arrow.right { right: 10px;  top: 50%;  transform: translateY(-50%); }

  .joystick-thumb {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: var(--cyan);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 4px 16px rgba(0,169,224,0.4);
    pointer-events: none;
    z-index: 2;
    transition: box-shadow 0.1s;
  }

  .joystick-thumb::after {
    content: '';
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    position: absolute;
    top: 10px; left: 14px;
  }

  .joystick-thumb.active { box-shadow: 0 6px 28px rgba(0,169,224,0.65); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    width: 100%;
    max-width: 340px;
    justify-content: center;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #dde4e8;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .status-dot.on { background: var(--cyan); }
  #status-cmd { color: var(--cyan); min-width: 70px; text-align: center; }

  .btn-stop {
    background: var(--white);
    border: 2px solid var(--cyan);
    border-radius: 6px;
    color: var(--cyan);
    font-family: 'Poppins', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 10px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }
  .btn-stop:active {
    background: #DF2B31;
    border-color: #DF2B31;
    color: #fff;
  }

  .divider {
    width: 100%;
    max-width: 340px;
    height: 1px;
    background: #e0e8ec;
  }
</style>
</head>
<body>

<div class="header">
  <div class="utec-logo">
    <svg class="isotipo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="17" fill="#00A9E0"/>
      <path d="M18 5 L30 12 L30 24 L18 31 L6 24 L6 12 Z" fill="none" stroke="white" stroke-width="1.5"/>
      <line x1="18" y1="5"  x2="18" y2="31" stroke="white" stroke-width="1.2"/>
      <line x1="6"  y1="12" x2="30" y2="24" stroke="white" stroke-width="1.2"/>
      <line x1="30" y1="12" x2="6"  y2="24" stroke="white" stroke-width="1.2"/>
    </svg>
    <div class="logo-text">
      <span class="logo-utec">UTEC</span>
      <span class="logo-sub">Universidad Tecnológica</span>
    </div>
  </div>
  <span class="header-title">Panel de Control · Robot</span>
</div>

<div class="sensor-card">
  <div class="sensor-icon">📡</div>
  <div class="sensor-info">
    <span class="sensor-label">Proximidad</span>
    <div class="sensor-row">
      <span class="sensor-value" id="dist">--</span>
      <span class="sensor-unit">cm</span>
    </div>
  </div>
</div>

<div class="joystick-zone" id="zone">
  <div class="ring"></div>
  <span class="dir-arrow up"    id="arr-up">▲</span>
  <span class="dir-arrow down"  id="arr-down">▼</span>
  <span class="dir-arrow left"  id="arr-left">◀</span>
  <span class="dir-arrow right" id="arr-right">▶</span>
  <div class="joystick-thumb" id="thumb"></div>
</div>

<div class="status-bar">
  <div class="status-dot" id="dot"></div>
  Comando: <span id="status-cmd">STOP</span>
</div>

<div class="divider"></div>

<button class="btn-stop" id="stopBtn">■ Parar</button>

<script>
  const zone   = document.getElementById('zone');
  const thumb  = document.getElementById('thumb');
  const distEl = document.getElementById('dist');
  const cmdEl  = document.getElementById('status-cmd');
  const dotEl  = document.getElementById('dot');
  const arrows = {
    up:    document.getElementById('arr-up'),
    down:  document.getElementById('arr-down'),
    left:  document.getElementById('arr-left'),
    right: document.getElementById('arr-right'),
  };

  const RADIUS = 77;
  let active = false;
  let currentCmd = 'stop';

  function getCenter() {
    const r = zone.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  function getDir(dx, dy) {
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 22) return 'stop';
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    if (angle > -45  && angle <= 45)   return 'right';
    if (angle > 45   && angle <= 135)  return 'down';
    if (angle > 135  || angle <= -135) return 'left';
    return 'up';
  }

  function updateThumb(dx, dy) {
    const dist = Math.sqrt(dx*dx + dy*dy);
    const scale = Math.min(dist, RADIUS) / (dist || 1);
    thumb.style.transform = `translate(calc(-50% + ${dx*scale}px), calc(-50% + ${dy*scale}px))`;
    thumb.classList.toggle('active', dist > 22);

    const dir = getDir(dx, dy);
    Object.keys(arrows).forEach(k => arrows[k].classList.toggle('active', k === dir));

    if (dir !== currentCmd) {
      currentCmd = dir;
      fetch('/' + dir).catch(() => {});
      cmdEl.textContent = dir.toUpperCase();
      dotEl.classList.toggle('on', dir !== 'stop');
    }
  }

  function resetThumb() {
    thumb.style.transform = 'translate(-50%, -50%)';
    thumb.classList.remove('active');
    Object.values(arrows).forEach(a => a.classList.remove('active'));
    if (currentCmd !== 'stop') {
      currentCmd = 'stop';
      fetch('/stop').catch(() => {});
      cmdEl.textContent = 'STOP';
      dotEl.classList.remove('on');
    }
  }

  zone.addEventListener('touchstart', e => { e.preventDefault(); active = true; const c = getCenter(); updateThumb(e.touches[0].clientX - c.x, e.touches[0].clientY - c.y); }, { passive: false });
  zone.addEventListener('touchmove',  e => { e.preventDefault(); if (!active) return; const c = getCenter(); updateThumb(e.touches[0].clientX - c.x, e.touches[0].clientY - c.y); }, { passive: false });
  zone.addEventListener('touchend',   e => { e.preventDefault(); active = false; resetThumb(); });

  zone.addEventListener('mousedown', e => { active = true; const c = getCenter(); updateThumb(e.clientX - c.x, e.clientY - c.y); });
  window.addEventListener('mousemove', e => { if (!active) return; const c = getCenter(); updateThumb(e.clientX - c.x, e.clientY - c.y); });
  window.addEventListener('mouseup', () => { if (active) { active = false; resetThumb(); } });

  document.getElementById('stopBtn').addEventListener('click', () => { active = false; resetThumb(); });

  // Polling distancia
  function pollDist() {
    fetch('/distancia')
      .then(r => r.text())
      .then(v => {
        const n = parseFloat(v);
        distEl.textContent = isNaN(n) ? '--' : n;
        distEl.className = 'sensor-value' + (n < 15 ? ' danger' : n < 30 ? ' warning' : '');
      })
      .catch(() => { distEl.textContent = '--'; });
  }
  pollDist();
  setInterval(pollDist, 500);
</script>
</body>
</html>
