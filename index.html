    <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robot Control – UTEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root { --cyan: #00A9E0; --cyan-dark: #0087B8; --black: #000; --white: #fff; --gray: #f4f6f8; --text-muted: #7a8a94; }
      * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
      body { background: var(--white); color: var(--black); font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; gap: 24px; }
      .header { border-bottom: 3px solid var(--cyan); padding-bottom: 16px; width: 100%; max-width: 340px; text-align:center; }
      .logo-utec { font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
      .sensor-card { background: var(--gray); border-left: 4px solid var(--cyan); border-radius: 8px; padding: 14px; width: 100%; max-width: 340px; display: flex; align-items: center; gap: 16px; }
      .sensor-value { font-size: 2.4rem; font-weight: 700; color: var(--cyan); }
      .sensor-value.warning { color: #F6CA21; }
      .sensor-value.danger  { color: #DF2B31; }
      .joystick-zone { width: 230px; height: 230px; border-radius: 50%; background: var(--gray); position: relative; box-shadow: 0 4px 24px rgba(0,0,169,0.1); }
      .joystick-thumb { width: 76px; height: 76px; border-radius: 50%; background: var(--cyan); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
      .btn-stop { border: 2px solid var(--cyan); border-radius: 6px; color: var(--cyan); font-weight: 700; padding: 10px 28px; cursor: pointer; background: white; text-transform: uppercase;}
      .btn-stop:active { background: #DF2B31; color: white; border-color: #DF2B31; }
    </style>
    </head>
    <body>
      <div class="header"><div class="logo-utec">UTEC</div><span>Panel de Control</span></div>
      <div class="sensor-card">📡 <div><small>PROXIMIDAD</small><br><span id="dist" class="sensor-value">--</span> cm</div></div>
      <div class="joystick-zone" id="zone"><div class="joystick-thumb" id="thumb"></div></div>
      <div>Comando: <span id="status-cmd" style="color:var(--cyan)">STOP</span></div>
      <button class="btn-stop" id="stopBtn">■ Parar</button>
      <script>
        const zone=document.getElementById('zone'), thumb=document.getElementById('thumb'), distEl=document.getElementById('dist'), cmdEl=document.getElementById('status-cmd');
        let active=false, currentCmd='stop';
        function getCenter(){const r=zone.getBoundingClientRect(); return{x:r.left+r.width/2, y:r.top+r.height/2};}
        function update(dx, dy){
          const dist=Math.sqrt(dx*dx+dy*dy), max=77;
          const s = Math.min(dist, max)/(dist||1);
          thumb.style.transform=`translate(calc(-50% + ${dx*s}px), calc(-50% + ${dy*s}px))`;
          let dir='stop';
          if(dist>22){
            const a=Math.atan2(dy, dx)*180/Math.PI;
            if(a>-45&&a<=45)dir='right'; else if(a>45&&a<=135)dir='down'; else if(a>135||a<=-135)dir='left'; else dir='up';
          }
          if(dir!==currentCmd){ currentCmd=dir; fetch('/'+dir); cmdEl.textContent=dir.toUpperCase(); }
        }
        zone.addEventListener('touchstart',e=>{active=true; const c=getCenter(); update(e.touches[0].clientX-c.x, e.touches[0].clientY-c.y);});
        zone.addEventListener('touchmove',e=>{if(active){const c=getCenter(); update(e.touches[0].clientX-c.x, e.touches[0].clientY-c.y);}});
        zone.addEventListener('touchend',()=> {active=false; thumb.style.transform='translate(-50%,-50%)'; fetch('/stop'); cmdEl.textContent='STOP'; currentCmd='stop';});
        setInterval(()=>{ fetch('/distancia').then(r=>r.text()).then(v=>{ 
          distEl.textContent=v;
          const n=parseInt(v);
          distEl.className='sensor-value'+(n<15?' danger':n<30?' warning':'');
        }); }, 500);
      </script>
    </body></html>
