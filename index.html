<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP8266 Robot Monitor - Cian</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff; /* Fondo Blanco */
            color: #333; /* Texto principal oscuro */
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        /* Pantalla del Sensor */
        .display-sensor {
            background: transparent; /* Fondo transparente */
            color: #00A9E0; /* Cian específico */
            padding: 20px;
            border: 4px solid #00A9E0; /* Borde cian */
            border-radius: 15px;
            display: inline-block;
            width: 250px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(0, 169, 224, 0.2);
        }

        .display-sensor small {
            color: #666;
            letter-spacing: 2px;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 5px;
        }

        .valor-distancia {
            font-size: 3rem;
            font-weight: bold;
        }

        /* Contenedor del Joystick */
        .joystick-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .fila {
            display: flex;
            gap: 15px;
        }

        /* Estilo de los botones */
        .btn {
            width: 85px;
            height: 85px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 50%; /* Botones redondos */
            border: none;
            background: #00A9E0; /* Fondo cian específico */
            color: white; /* Iconos en blanco */
            cursor: pointer;
            box-shadow: 0 6px rgba(0, 137, 184, 0.8); /* Sombra cian más oscura */
            transition: all 0.1s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: #0089B8; /* Cian más oscuro al presionar */
            box-shadow: 0 2px rgba(0, 86, 115, 0.8);
            transform: translateY(4px);
        }

        /* Botón de Parada Central */
        .btn-stop {
            background: #ffffff; /* Fondo blanco */
            color: #00A9E0; /* Icono cian */
            border: 4px solid #00A9E0; /* Borde cian */
            box-shadow: 0 6px rgba(0, 137, 184, 0.3);
        }

        .btn-stop:active {
            background: #f0f0f0;
            box-shadow: 0 2px rgba(0, 86, 115, 0.3);
        }

        .status-box {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #666;
        }

        #comando-actual {
            color: #00A9E0; /* Estado en cian */
            font-weight: bold;
            text-transform: uppercase;
        }

        .update-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #ffffff;
            color: #00A9E0; /* Texto cian */
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid #00A9E0; /* Borde cian */
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .update-link:hover {
            background: #e6f7ff;
        }
    </style>
</head>
<body>

    <h2>PANEL DE CONTROL ROBOT</h2>

    <div class="display-sensor">
        <small>DISTANCIA ULTRASÓNICO</small>
        <span class="valor-distancia">30 cm</span>
    </div>

    <div class="joystick-container">
        <div class="fila">
            <a href="/up" class="btn">▲</a>
        </div>
        <div class="fila">
            <a href="/left" class="btn">◀</a>
            <a href="/stop" class="btn btn-stop">■</a> <a href="/right" class="btn">▶</a>
        </div>
        <div class="fila">
            <a href="/down" class="btn">▼</a>
        </div>
    </div>

    <div class="status-box">
        Último comando: <span id="comando-actual">BLOQUEADO (30cm)</span>
    </div>

    <a href="#" class="update-link">ACTUALIZAR DATOS</a>

</body>
</html>
