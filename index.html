<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Robot - Cian & Blanco</title>
    <style>
        /* Estilos Generales */
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff; /* Fondo Blanco */
            color: #333333;
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        h2 {
            color: #00A9E0; /* Cian */
            margin-bottom: 20px;
        }

        /* Pantalla de Distancia */
        .display-sensor {
            background-color: #ffffff;
            color: #00A9E0; /* Texto Cian */
            padding: 20px;
            border: 4px solid #00A9E0; /* Borde Cian */
            border-radius: 20px;
            display: inline-block;
            width: 240px;
            box-shadow: 0 4px 15px rgba(0, 169, 224, 0.15);
            margin-bottom: 30px;
        }

        .display-sensor small {
            color: #888;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            display: block;
        }

        .valor-distancia {
            font-size: 3.5rem;
            font-weight: bold;
        }

        /* Joystick de Botones */
        .joystick {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .fila {
            display: flex;
            gap: 15px;
        }

        /* Botones Direccionales */
        .btn {
            width: 85px;
            height: 85px;
            background-color: #00A9E0; /* Fondo Cian */
            color: #ffffff; /* Icono Blanco */
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 50%;
            box-shadow: 0 6px #0089B8; /* Sombra Cian Oscuro */
            transition: all 0.1s ease;
        }

        .btn:active {
            box-shadow: 0 2px #0056b3;
            transform: translateY(4px);
        }

        /* Botón de Parada (Stop) */
        .btn-stop {
            background-color: #ffffff;
            color: #00A9E0;
            border: 4px solid #00A9E0;
            box-shadow: 0 6px #e0e0e0;
        }

        .btn-stop:active {
            box-shadow: 0 2px #bdbdbd;
        }

        /* Estado del Comando */
        .status-container {
            margin-top: 30px;
            font-size: 1rem;
            color: #666;
        }

        #cmd {
            color: #00A9E0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>PANEL DE CONTROL</h2>

    <div class="display-sensor">
        <small>Proximidad</small>
        <span id="dist" class="valor-distancia">--</span> <span style="font-size: 1.5rem;">cm</span>
    </div>

    <div class="joystick">
        <div class="fila">
            <a href="/up" class="btn">▲</a>
        </div>
        <div class="fila">
            <a href="/left" class="btn">◀</a>
            <a href="/stop" class="btn btn-stop">■</a>
            <a href="/right" class="btn">▶</a>
        </div>
        <div class="fila">
            <a href="/down" class="btn">▼</a>
        </div>
    </div>

    <div class="status-container">
        Comando actual: <span id="cmd">DETENIDO</span>
    </div>

    <script>
        setInterval(function() {
            fetch('/distancia')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('dist').innerHTML = data;
                })
                .catch(err => {
                    // Si no hay conexión, se mantiene en "--"
                });
        }, 500);
    </script>

</body>
</html>
